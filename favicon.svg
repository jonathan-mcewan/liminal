  <circle cx="16" cy="16" r="14" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.75"/>
  <!-- Primary spokes (every other, full length, r=5→13.5) -->
  <line x1="16"    y1="11"    x2="16"    y2="2.5"   stroke="rgba(255,255,255,0.85)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="20.33" y1="13.5"  x2="27.69" y2="9.25"  stroke="rgba(255,255,255,0.85)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="20.33" y1="18.5"  x2="27.69" y2="22.75" stroke="rgba(255,255,255,0.85)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="16"    y1="21"    x2="16"    y2="29.5"  stroke="rgba(255,255,255,0.85)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="11.67" y1="18.5"  x2="4.31"  y2="22.75" stroke="rgba(255,255,255,0.85)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="11.67" y1="13.5"  x2="4.31"  y2="9.25"  stroke="rgba(255,255,255,0.85)" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Secondary spokes (interleaved, shorter, r=5→9) -->
  <line x1="18.5"  y1="11.67" x2="20.5"  y2="8.21"  stroke="rgba(255,255,255,0.36)" stroke-width="0.65" stroke-linecap="round"/>
  <line x1="21"    y1="16"    x2="25"    y2="16"    stroke="rgba(255,255,255,0.36)" stroke-width="0.65" stroke-linecap="round"/>
  <line x1="18.5"  y1="20.33" x2="20.5"  y2="23.79" stroke="rgba(255,255,255,0.36)" stroke-width="0.65" stroke-linecap="round"/>
  <line x1="13.5"  y1="20.33" x2="11.5"  y2="23.79" stroke="rgba(255,255,255,0.36)" stroke-width="0.65" stroke-linecap="round"/>
  <line x1="11"    y1="16"    x2="7"     y2="16"    stroke="rgba(255,255,255,0.36)" stroke-width="0.65" stroke-linecap="round"/>
  <line x1="13.5"  y1="11.67" x2="11.5"  y2="8.21"  stroke="rgba(255,255,255,0.36)" stroke-width="0.65" stroke-linecap="round"/>
