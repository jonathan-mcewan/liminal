<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 340 400'>
<defs>
  <!-- Vertical fade mask: invisible at top, fully visible at bottom -->
  <linearGradient id='upfade' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='white' stop-opacity='0'/>
    <stop offset='15%' stop-color='white' stop-opacity='0.05'/>
    <stop offset='45%' stop-color='white' stop-opacity='0.40'/>
    <stop offset='70%' stop-color='white' stop-opacity='0.78'/>
    <stop offset='100%' stop-color='white' stop-opacity='1'/>
  </linearGradient>
  <mask id='vm'><rect width='340' height='400' fill='url(#upfade)'/></mask>

  <!-- Event horizon: bright cyan center fading outward -->
  <radialGradient id='horizon' cx='50%' cy='50%' r='50%'>
    <stop offset='0%' stop-color='#50c8ff' stop-opacity='0.22'/>
    <stop offset='30%' stop-color='#50c8ff' stop-opacity='0.10'/>
    <stop offset='60%' stop-color='#50c8ff' stop-opacity='0.04'/>
    <stop offset='100%' stop-color='#50c8ff' stop-opacity='0'/>
  </radialGradient>

  <!-- Wide ambient halo behind ring -->
  <radialGradient id='halo' cx='50%' cy='72%' r='55%'>
    <stop offset='0%' stop-color='#50c8ff' stop-opacity='0.08'/>
    <stop offset='60%' stop-color='#50c8ff' stop-opacity='0.02'/>
    <stop offset='100%' stop-color='#50c8ff' stop-opacity='0'/>
  </radialGradient>

  <!-- Warm amber ground glow -->
  <radialGradient id='warm' cx='50%' cy='100%' r='50%'>
    <stop offset='0%' stop-color='#c8a03c' stop-opacity='0.10'/>
    <stop offset='50%' stop-color='#c8a03c' stop-opacity='0.02'/>
    <stop offset='100%' stop-color='#c8a03c' stop-opacity='0'/>
  </radialGradient>

  <!-- Filters -->
  <filter id='glow'><feGaussianBlur stdDeviation='5' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
  <filter id='glow-lg'><feGaussianBlur stdDeviation='12' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
  <filter id='glow-sm'><feGaussianBlur stdDeviation='2' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
</defs>

<g mask='url(#vm)' opacity='0.5'>

  <!-- ═══ Layer 1: Ambient ═══ -->
  <rect x='0' y='260' width='340' height='140' fill='url(#warm)'/>
  <circle cx='170' cy='290' r='200' fill='url(#halo)' filter='url(#glow-lg)'/>

  <!-- ═══ Layer 2: Circuit traces (Sheikah-style geometric PCB lines) ═══ -->
  <g stroke='#50c8ff' fill='none'>
    <!-- Top trace: upward from ring -->
    <path d='M170,160 L170,100 L170,80' stroke-width='0.6' stroke-opacity='0.10'/>
    <path d='M170,100 L200,100 L200,70' stroke-width='0.4' stroke-opacity='0.06'/>
    <path d='M170,100 L140,100 L140,75' stroke-width='0.4' stroke-opacity='0.06'/>

    <!-- Right traces -->
    <path d='M300,290 L320,290 L320,260 L340,260' stroke-width='0.5' stroke-opacity='0.08'/>
    <path d='M295,255 L310,255 L310,230 L325,230' stroke-width='0.4' stroke-opacity='0.06'/>
    <path d='M280,210 L295,210 L295,185 L310,185' stroke-width='0.35' stroke-opacity='0.05'/>
    <path d='M300,320 L315,320 L315,345 L330,345' stroke-width='0.4' stroke-opacity='0.06'/>

    <!-- Left traces -->
    <path d='M40,290 L20,290 L20,260 L0,260' stroke-width='0.5' stroke-opacity='0.08'/>
    <path d='M45,255 L30,255 L30,230 L15,230' stroke-width='0.4' stroke-opacity='0.06'/>
    <path d='M60,210 L45,210 L45,185 L30,185' stroke-width='0.35' stroke-opacity='0.05'/>
    <path d='M40,320 L25,320 L25,345 L10,345' stroke-width='0.4' stroke-opacity='0.06'/>

    <!-- Diagonal traces (45-degree Sheikah style) -->
    <path d='M260,195 L280,175 L280,155' stroke-width='0.35' stroke-opacity='0.05'/>
    <path d='M80,195 L60,175 L60,155' stroke-width='0.35' stroke-opacity='0.05'/>
    <path d='M250,370 L270,390 L270,400' stroke-width='0.35' stroke-opacity='0.06'/>
    <path d='M90,370 L70,390 L70,400' stroke-width='0.35' stroke-opacity='0.06'/>

    <!-- Bottom root traces -->
    <path d='M170,400 L170,395 L190,380' stroke-width='0.5' stroke-opacity='0.08'/>
    <path d='M170,400 L170,395 L150,380' stroke-width='0.5' stroke-opacity='0.08'/>
    <path d='M120,400 L120,385 L135,370' stroke-width='0.4' stroke-opacity='0.06'/>
    <path d='M220,400 L220,385 L205,370' stroke-width='0.4' stroke-opacity='0.06'/>
  </g>

  <!-- Circuit node dots -->
  <g fill='#50c8ff'>
    <circle cx='170' cy='100' r='1.2' fill-opacity='0.10'/>
    <circle cx='200' cy='100' r='0.8' fill-opacity='0.06'/>
    <circle cx='140' cy='100' r='0.8' fill-opacity='0.06'/>
    <circle cx='170' cy='80' r='0.7' fill-opacity='0.05'/>
    <circle cx='320' cy='260' r='0.8' fill-opacity='0.06'/>
    <circle cx='310' cy='230' r='0.7' fill-opacity='0.05'/>
    <circle cx='20' cy='260' r='0.8' fill-opacity='0.06'/>
    <circle cx='30' cy='230' r='0.7' fill-opacity='0.05'/>
    <circle cx='280' cy='175' r='0.6' fill-opacity='0.04'/>
    <circle cx='60' cy='175' r='0.6' fill-opacity='0.04'/>
    <circle cx='200' cy='70' r='0.6' fill-opacity='0.04'/>
    <circle cx='140' cy='75' r='0.6' fill-opacity='0.04'/>
  </g>

  <!-- ═══ Layer 3: Subtle energy rays (12, radial from ring center) ═══ -->
  <g stroke='#50c8ff' stroke-width='0.5'>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.06'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.06' transform='rotate(30, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.04' transform='rotate(60, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.06' transform='rotate(90, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.04' transform='rotate(120, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.06' transform='rotate(150, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.06' transform='rotate(180, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.06' transform='rotate(210, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.04' transform='rotate(240, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.06' transform='rotate(270, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.04' transform='rotate(300, 170, 290)'/>
    <line x1='170' y1='145' x2='170' y2='70' stroke-opacity='0.06' transform='rotate(330, 170, 290)'/>
  </g>

  <!-- ═══ Layer 4: Event horizon ═══ -->
  <!-- Puddle fill -->
  <circle cx='170' cy='290' r='108' fill='url(#horizon)'/>

  <!-- Concentric ripple circles (water surface) -->
  <circle cx='170' cy='290' r='92' fill='none' stroke='#50c8ff' stroke-width='0.5' stroke-opacity='0.07'/>
  <circle cx='170' cy='290' r='72' fill='none' stroke='#50c8ff' stroke-width='0.5' stroke-opacity='0.06'/>
  <circle cx='170' cy='290' r='52' fill='none' stroke='#50c8ff' stroke-width='0.4' stroke-opacity='0.05'/>
  <circle cx='170' cy='290' r='34' fill='none' stroke='#50c8ff' stroke-width='0.4' stroke-opacity='0.04'/>
  <circle cx='170' cy='290' r='18' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.03'/>

  <!-- Center hotspot -->
  <circle cx='170' cy='290' r='18' fill='#50c8ff' fill-opacity='0.08' filter='url(#glow)'/>
  <circle cx='170' cy='290' r='6' fill='#50c8ff' fill-opacity='0.14' filter='url(#glow-sm)'/>

  <!-- ═══ Layer 5: Ring structure ═══ -->
  <!-- Outer ring -->
  <circle cx='170' cy='290' r='130' fill='none' stroke='#50c8ff' stroke-width='1.0' stroke-opacity='0.22'/>
  <circle cx='170' cy='290' r='126' fill='none' stroke='#50c8ff' stroke-width='0.5' stroke-opacity='0.10'/>

  <!-- Inner ring -->
  <circle cx='170' cy='290' r='112' fill='none' stroke='#50c8ff' stroke-width='0.8' stroke-opacity='0.18'/>
  <circle cx='170' cy='290' r='110' fill='none' stroke='#50c8ff' stroke-width='0.4' stroke-opacity='0.08'/>

  <!-- Ring band fill (subtle between outer and inner) -->
  <circle cx='170' cy='290' r='121' fill='none' stroke='#50c8ff' stroke-width='14' stroke-opacity='0.03'/>

  <!-- ═══ Layer 6: Glyph tick marks (36 marks, every 10 degrees) ═══ -->
  <!-- Normal ticks: short lines from r=126 to r=134 -->
  <!-- Major ticks every 30 deg: from r=124 to r=136, brighter -->
  <g stroke='#50c8ff'>
    <!-- Major ticks (every 30 degrees = 12 ticks) -->
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(0, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(30, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(60, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(90, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(120, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(150, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(180, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(210, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(240, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(270, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(300, 170, 290)'/>
    <line x1='170' y1='154' x2='170' y2='166' stroke-width='0.8' stroke-opacity='0.20' transform='rotate(330, 170, 290)'/>

    <!-- Minor ticks (every 10 degrees, skip multiples of 30) -->
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(10, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(20, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(40, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(50, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(70, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(80, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(100, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(110, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(130, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(140, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(160, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(170, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(190, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(200, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(220, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(230, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(250, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(260, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(280, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(290, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(310, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(320, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(340, 170, 290)'/>
    <line x1='170' y1='157' x2='170' y2='163' stroke-width='0.5' stroke-opacity='0.12' transform='rotate(350, 170, 290)'/>
  </g>

  <!-- ═══ Layer 7: Cardinal decorations (small diamonds at N/S/E/W) ═══ -->
  <g fill='none' stroke='#50c8ff' stroke-width='0.6' stroke-opacity='0.18'>
    <!-- North (top) diamond -->
    <rect x='166' y='152' width='8' height='8' transform='rotate(45, 170, 156)'/>
    <!-- East diamond -->
    <rect x='296' y='286' width='8' height='8' transform='rotate(45, 300, 290)'/>
    <!-- West diamond -->
    <rect x='36' y='286' width='8' height='8' transform='rotate(45, 40, 290)'/>
    <!-- South diamond -->
    <rect x='166' y='416' width='8' height='8' transform='rotate(45, 170, 420)'/>
  </g>

  <!-- ═══ Layer 8: Chevrons (9 total, 40-degree spacing) ═══ -->
  <!-- Each chevron: V-shape straddling outer ring at r=130 -->
  <!-- Defined at top (0 deg) then rotated around ring center -->
  <g fill='#c8a03c' stroke='#c8a03c'>
    <!-- Top chevron (active — brightest) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.22' stroke-width='0.6' stroke-opacity='0.35'/>
    <!-- Chevron 2 (40 deg) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.12' stroke-width='0.5' stroke-opacity='0.22' transform='rotate(40, 170, 290)'/>
    <!-- Chevron 3 (80 deg) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.12' stroke-width='0.5' stroke-opacity='0.22' transform='rotate(80, 170, 290)'/>
    <!-- Chevron 4 (120 deg) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.12' stroke-width='0.5' stroke-opacity='0.22' transform='rotate(120, 170, 290)'/>
    <!-- Chevron 5 (160 deg) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.12' stroke-width='0.5' stroke-opacity='0.22' transform='rotate(160, 170, 290)'/>
    <!-- Chevron 6 (200 deg) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.12' stroke-width='0.5' stroke-opacity='0.22' transform='rotate(200, 170, 290)'/>
    <!-- Chevron 7 (240 deg) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.12' stroke-width='0.5' stroke-opacity='0.22' transform='rotate(240, 170, 290)'/>
    <!-- Chevron 8 (280 deg) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.12' stroke-width='0.5' stroke-opacity='0.22' transform='rotate(280, 170, 290)'/>
    <!-- Chevron 9 (320 deg) -->
    <path d='M164,158 L170,142 L176,158 Z' fill-opacity='0.12' stroke-width='0.5' stroke-opacity='0.22' transform='rotate(320, 170, 290)'/>
  </g>

  <!-- ═══ Layer 9: Chevron glow dots ═══ -->
  <g fill='#c8a03c'>
    <!-- Top chevron glow (brightest) -->
    <circle cx='170' cy='144' r='3.5' fill-opacity='0.25' filter='url(#glow)'/>
    <!-- Other chevron glows -->
    <circle cx='170' cy='144' r='2.5' fill-opacity='0.14' filter='url(#glow-sm)' transform='rotate(40, 170, 290)'/>
    <circle cx='170' cy='144' r='2.5' fill-opacity='0.14' filter='url(#glow-sm)' transform='rotate(80, 170, 290)'/>
    <circle cx='170' cy='144' r='2.5' fill-opacity='0.14' filter='url(#glow-sm)' transform='rotate(120, 170, 290)'/>
    <circle cx='170' cy='144' r='2.5' fill-opacity='0.14' filter='url(#glow-sm)' transform='rotate(160, 170, 290)'/>
    <circle cx='170' cy='144' r='2.5' fill-opacity='0.14' filter='url(#glow-sm)' transform='rotate(200, 170, 290)'/>
    <circle cx='170' cy='144' r='2.5' fill-opacity='0.14' filter='url(#glow-sm)' transform='rotate(240, 170, 290)'/>
    <circle cx='170' cy='144' r='2.5' fill-opacity='0.14' filter='url(#glow-sm)' transform='rotate(280, 170, 290)'/>
    <circle cx='170' cy='144' r='2.5' fill-opacity='0.14' filter='url(#glow-sm)' transform='rotate(320, 170, 290)'/>
  </g>

  <!-- ═══ Scattered luminous stone dots ═══ -->
  <g fill='#50c8ff'>
    <circle cx='25' cy='220' r='0.5' fill-opacity='0.04'/>
    <circle cx='315' cy='200' r='0.5' fill-opacity='0.04'/>
    <circle cx='50' cy='140' r='0.4' fill-opacity='0.03'/>
    <circle cx='290' cy='130' r='0.4' fill-opacity='0.03'/>
    <circle cx='100' cy='90' r='0.4' fill-opacity='0.02'/>
    <circle cx='240' cy='85' r='0.4' fill-opacity='0.02'/>
    <circle cx='330' cy='310' r='0.5' fill-opacity='0.04'/>
    <circle cx='10' cy='320' r='0.5' fill-opacity='0.04'/>
    <circle cx='75' cy='380' r='0.4' fill-opacity='0.03'/>
    <circle cx='265' cy='385' r='0.4' fill-opacity='0.03'/>
  </g>

</g>
</svg>
