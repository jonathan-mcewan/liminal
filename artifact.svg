<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 340 400'>
<defs>
  <!-- Vertical fade mask -->
  <linearGradient id='upfade' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='white' stop-opacity='0'/>
    <stop offset='15%' stop-color='white' stop-opacity='0.05'/>
    <stop offset='45%' stop-color='white' stop-opacity='0.40'/>
    <stop offset='70%' stop-color='white' stop-opacity='0.78'/>
    <stop offset='100%' stop-color='white' stop-opacity='1'/>
  </linearGradient>
  <mask id='vm'><rect width='340' height='400' fill='url(#upfade)'/></mask>

  <!-- Event horizon: deep wormhole, bluer than Milky Way -->
  <radialGradient id='horizon' cx='50%' cy='50%' r='50%'>
    <stop offset='0%' stop-color='#8ad4ff' stop-opacity='0.18'/>
    <stop offset='20%' stop-color='#50c8ff' stop-opacity='0.12'/>
    <stop offset='50%' stop-color='#2a7ea8' stop-opacity='0.06'/>
    <stop offset='80%' stop-color='#1a4a6a' stop-opacity='0.03'/>
    <stop offset='100%' stop-color='#1a4a6a' stop-opacity='0'/>
  </radialGradient>

  <!-- Inner luminance — the crystalline glow of Ancient tech -->
  <radialGradient id='inner-lum' cx='50%' cy='50%' r='42%'>
    <stop offset='0%' stop-color='#b0e0ff' stop-opacity='0.10'/>
    <stop offset='100%' stop-color='#50c8ff' stop-opacity='0'/>
  </radialGradient>

  <!-- Wide ambient halo -->
  <radialGradient id='halo' cx='50%' cy='72%' r='55%'>
    <stop offset='0%' stop-color='#50c8ff' stop-opacity='0.06'/>
    <stop offset='50%' stop-color='#2a7ea8' stop-opacity='0.02'/>
    <stop offset='100%' stop-color='#1a4a6a' stop-opacity='0'/>
  </radialGradient>

  <!-- Cool base glow (no amber — Atlantis is all blue) -->
  <radialGradient id='base-glow' cx='50%' cy='100%' r='45%'>
    <stop offset='0%' stop-color='#50c8ff' stop-opacity='0.06'/>
    <stop offset='60%' stop-color='#2a7ea8' stop-opacity='0.02'/>
    <stop offset='100%' stop-color='#1a4a6a' stop-opacity='0'/>
  </radialGradient>

  <!-- Glyph illumination — glow from within -->
  <radialGradient id='glyph-glow' cx='50%' cy='50%' r='50%'>
    <stop offset='0%' stop-color='#b0e0ff' stop-opacity='0.30'/>
    <stop offset='100%' stop-color='#50c8ff' stop-opacity='0'/>
  </radialGradient>

  <!-- Filters -->
  <filter id='glow'><feGaussianBlur stdDeviation='5' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
  <filter id='glow-lg'><feGaussianBlur stdDeviation='10' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
  <filter id='glow-sm'><feGaussianBlur stdDeviation='2.5' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
  <filter id='glow-xs'><feGaussianBlur stdDeviation='1' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
</defs>

<g mask='url(#vm)' opacity='0.5'>

  <!-- ═══ Layer 1: Ambient atmosphere ═══ -->
  <rect x='0' y='280' width='340' height='120' fill='url(#base-glow)'/>
  <circle cx='170' cy='290' r='190' fill='url(#halo)' filter='url(#glow-lg)'/>

  <!-- ═══ Layer 2: Atlantis city snowflake silhouette (very faint, behind gate) ═══ -->
  <!-- Six-pier structure visible through the event horizon -->
  <g stroke='#50c8ff' fill='none' opacity='0.06'>
    <!-- Central hexagon -->
    <polygon points='170,260 191,273 191,297 170,310 149,297 149,273' stroke-width='0.4'/>
    <!-- Six piers radiating outward -->
    <line x1='170' y1='260' x2='170' y2='235' stroke-width='0.5'/>
    <line x1='191' y1='273' x2='212' y2='258' stroke-width='0.5'/>
    <line x1='191' y1='297' x2='212' y2='312' stroke-width='0.5'/>
    <line x1='170' y1='310' x2='170' y2='335' stroke-width='0.5'/>
    <line x1='149' y1='297' x2='128' y2='312' stroke-width='0.5'/>
    <line x1='149' y1='273' x2='128' y2='258' stroke-width='0.5'/>
    <!-- Pier tips (small diamonds) -->
    <rect x='167' y='230' width='6' height='6' transform='rotate(45,170,233)' stroke-width='0.3'/>
    <rect x='209' y='253' width='6' height='6' transform='rotate(45,212,256)' stroke-width='0.3'/>
    <rect x='209' y='307' width='6' height='6' transform='rotate(45,212,310)' stroke-width='0.3'/>
    <rect x='167' y='330' width='6' height='6' transform='rotate(45,170,333)' stroke-width='0.3'/>
    <rect x='125' y='307' width='6' height='6' transform='rotate(45,128,310)' stroke-width='0.3'/>
    <rect x='125' y='253' width='6' height='6' transform='rotate(45,128,256)' stroke-width='0.3'/>
    <!-- Outer ring of the city (barely visible) -->
    <circle cx='170' cy='285' r='62' stroke-width='0.3'/>
  </g>

  <!-- ═══ Layer 3: Event horizon ═══ -->
  <circle cx='170' cy='285' r='105' fill='url(#horizon)'/>
  <circle cx='170' cy='285' r='80' fill='url(#inner-lum)'/>

  <!-- Smooth concentric ripples — Atlantis horizon is calmer than Milky Way -->
  <circle cx='170' cy='285' r='88' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.05'/>
  <circle cx='170' cy='285' r='70' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.04'/>
  <circle cx='170' cy='285' r='52' fill='none' stroke='#50c8ff' stroke-width='0.25' stroke-opacity='0.04'/>
  <circle cx='170' cy='285' r='36' fill='none' stroke='#50c8ff' stroke-width='0.25' stroke-opacity='0.03'/>
  <circle cx='170' cy='285' r='22' fill='none' stroke='#b0e0ff' stroke-width='0.2' stroke-opacity='0.03'/>

  <!-- Centre luminance -->
  <circle cx='170' cy='285' r='14' fill='#b0e0ff' fill-opacity='0.06' filter='url(#glow)'/>
  <circle cx='170' cy='285' r='4' fill='#b0e0ff' fill-opacity='0.10' filter='url(#glow-sm)'/>

  <!-- ═══ Layer 4: Pegasus gate — smooth, refined ring ═══ -->
  <!-- The Atlantis gate is sleeker: thin luminous bands, no chunky segments -->

  <!-- Outermost edge — crisp hairline -->
  <circle cx='170' cy='285' r='128' fill='none' stroke='#8ad4ff' stroke-width='0.6' stroke-opacity='0.20'/>

  <!-- Primary ring band — subtle fill glow -->
  <circle cx='170' cy='285' r='121' fill='none' stroke='#50c8ff' stroke-width='12' stroke-opacity='0.025'/>

  <!-- Ring structure lines -->
  <circle cx='170' cy='285' r='127' fill='none' stroke='#50c8ff' stroke-width='0.4' stroke-opacity='0.14'/>
  <circle cx='170' cy='285' r='115' fill='none' stroke='#50c8ff' stroke-width='0.4' stroke-opacity='0.12'/>

  <!-- Inner edge — slightly brighter, the "lip" of the gate -->
  <circle cx='170' cy='285' r='108' fill='none' stroke='#8ad4ff' stroke-width='0.5' stroke-opacity='0.18'/>
  <circle cx='170' cy='285' r='107' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.08'/>

  <!-- Decorative mid-ring line -->
  <circle cx='170' cy='285' r='121' fill='none' stroke='#b0e0ff' stroke-width='0.2' stroke-opacity='0.06'/>

  <!-- ═══ Layer 5: Illuminated Pegasus glyphs (36 around inner track) ═══ -->
  <!-- Atlantis symbols glow from within — small luminous marks, not mechanical ticks -->
  <!-- Placed on the ring band between r=115 and r=127 -->

  <!-- Major glyphs (every 30 deg) — brighter, slightly larger -->
  <g>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(0,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(30,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(60,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(90,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(120,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(150,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(180,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(210,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(240,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(270,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(300,170,285)'/>
    <circle cx='170' cy='163' r='2.5' fill='url(#glyph-glow)' transform='rotate(330,170,285)'/>
  </g>

  <!-- Minor glyphs (every 10 deg, skip 30s) — small Ancient script marks -->
  <!-- Tiny line segments suggesting flowing Ancient writing -->
  <g stroke='#8ad4ff' fill='none'>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(10,170,285)'/>
    <line x1='169' y1='162' x2='171' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(20,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(40,170,285)'/>
    <line x1='171' y1='162' x2='169' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(50,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(70,170,285)'/>
    <line x1='169' y1='162' x2='171' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(80,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(100,170,285)'/>
    <line x1='171' y1='162' x2='169' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(110,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(130,170,285)'/>
    <line x1='169' y1='162' x2='171' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(140,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(160,170,285)'/>
    <line x1='171' y1='162' x2='169' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(170,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(190,170,285)'/>
    <line x1='169' y1='162' x2='171' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(200,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(220,170,285)'/>
    <line x1='171' y1='162' x2='169' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(230,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(250,170,285)'/>
    <line x1='169' y1='162' x2='171' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(260,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(280,170,285)'/>
    <line x1='171' y1='162' x2='169' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(290,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(310,170,285)'/>
    <line x1='169' y1='162' x2='171' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(320,170,285)'/>
    <line x1='170' y1='161' x2='170' y2='166' stroke-width='0.4' stroke-opacity='0.10' transform='rotate(340,170,285)'/>
    <line x1='171' y1='162' x2='169' y2='165' stroke-width='0.3' stroke-opacity='0.08' transform='rotate(350,170,285)'/>
  </g>

  <!-- ═══ Layer 6: Light indicators (replacing mechanical chevrons) ═══ -->
  <!-- Atlantis gate has 9 subtle light points that illuminate, not chunky V-shapes -->
  <g>
    <!-- Top indicator (active — brightest, the "point of origin") -->
    <circle cx='170' cy='155' r='2' fill='#b0e0ff' fill-opacity='0.28' filter='url(#glow-sm)'/>
    <circle cx='170' cy='155' r='4.5' fill='none' stroke='#8ad4ff' stroke-width='0.4' stroke-opacity='0.16'/>

    <!-- Remaining 8 indicators (40-degree spacing) -->
    <circle cx='170' cy='155' r='1.5' fill='#8ad4ff' fill-opacity='0.16' filter='url(#glow-xs)' transform='rotate(40,170,285)'/>
    <circle cx='170' cy='155' r='3.5' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.10' transform='rotate(40,170,285)'/>

    <circle cx='170' cy='155' r='1.5' fill='#8ad4ff' fill-opacity='0.16' filter='url(#glow-xs)' transform='rotate(80,170,285)'/>
    <circle cx='170' cy='155' r='3.5' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.10' transform='rotate(80,170,285)'/>

    <circle cx='170' cy='155' r='1.5' fill='#8ad4ff' fill-opacity='0.16' filter='url(#glow-xs)' transform='rotate(120,170,285)'/>
    <circle cx='170' cy='155' r='3.5' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.10' transform='rotate(120,170,285)'/>

    <circle cx='170' cy='155' r='1.5' fill='#8ad4ff' fill-opacity='0.16' filter='url(#glow-xs)' transform='rotate(160,170,285)'/>
    <circle cx='170' cy='155' r='3.5' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.10' transform='rotate(160,170,285)'/>

    <circle cx='170' cy='155' r='1.5' fill='#8ad4ff' fill-opacity='0.16' filter='url(#glow-xs)' transform='rotate(200,170,285)'/>
    <circle cx='170' cy='155' r='3.5' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.10' transform='rotate(200,170,285)'/>

    <circle cx='170' cy='155' r='1.5' fill='#8ad4ff' fill-opacity='0.16' filter='url(#glow-xs)' transform='rotate(240,170,285)'/>
    <circle cx='170' cy='155' r='3.5' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.10' transform='rotate(240,170,285)'/>

    <circle cx='170' cy='155' r='1.5' fill='#8ad4ff' fill-opacity='0.16' filter='url(#glow-xs)' transform='rotate(280,170,285)'/>
    <circle cx='170' cy='155' r='3.5' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.10' transform='rotate(280,170,285)'/>

    <circle cx='170' cy='155' r='1.5' fill='#8ad4ff' fill-opacity='0.16' filter='url(#glow-xs)' transform='rotate(320,170,285)'/>
    <circle cx='170' cy='155' r='3.5' fill='none' stroke='#50c8ff' stroke-width='0.3' stroke-opacity='0.10' transform='rotate(320,170,285)'/>
  </g>

  <!-- ═══ Layer 7: Crystalline radial traces (Ancient tech conduits) ═══ -->
  <!-- Thin, clean geometric lines — not PCB traces, more like energy conduits in crystal -->
  <g stroke='#50c8ff' fill='none'>
    <!-- Straight radial lines from outer ring to edge of frame -->
    <line x1='170' y1='157' x2='170' y2='90' stroke-width='0.3' stroke-opacity='0.07'/>
    <line x1='170' y1='157' x2='170' y2='90' stroke-width='0.3' stroke-opacity='0.05' transform='rotate(45,170,285)'/>
    <line x1='170' y1='157' x2='170' y2='90' stroke-width='0.3' stroke-opacity='0.07' transform='rotate(90,170,285)'/>
    <line x1='170' y1='157' x2='170' y2='90' stroke-width='0.3' stroke-opacity='0.05' transform='rotate(135,170,285)'/>
    <line x1='170' y1='157' x2='170' y2='90' stroke-width='0.3' stroke-opacity='0.07' transform='rotate(180,170,285)'/>
    <line x1='170' y1='157' x2='170' y2='90' stroke-width='0.3' stroke-opacity='0.05' transform='rotate(225,170,285)'/>
    <line x1='170' y1='157' x2='170' y2='90' stroke-width='0.3' stroke-opacity='0.07' transform='rotate(270,170,285)'/>
    <line x1='170' y1='157' x2='170' y2='90' stroke-width='0.3' stroke-opacity='0.05' transform='rotate(315,170,285)'/>

    <!-- Outer concentric rings suggesting Ancient tech infrastructure -->
    <circle cx='170' cy='285' r='148' stroke-width='0.2' stroke-opacity='0.04'/>
    <circle cx='170' cy='285' r='165' stroke-width='0.15' stroke-opacity='0.03'/>
    <circle cx='170' cy='285' r='185' stroke-width='0.15' stroke-opacity='0.02'/>
  </g>

  <!-- ═══ Layer 8: Scattered luminous particles ═══ -->
  <!-- Like light refracting through Ancient crystal architecture -->
  <g fill='#b0e0ff'>
    <circle cx='30' cy='210' r='0.4' fill-opacity='0.03'/>
    <circle cx='310' cy='195' r='0.4' fill-opacity='0.03'/>
    <circle cx='55' cy='150' r='0.3' fill-opacity='0.02'/>
    <circle cx='285' cy='140' r='0.3' fill-opacity='0.02'/>
    <circle cx='95' cy='100' r='0.3' fill-opacity='0.02'/>
    <circle cx='245' cy='95' r='0.3' fill-opacity='0.02'/>
    <circle cx='20' cy='310' r='0.4' fill-opacity='0.03'/>
    <circle cx='320' cy='320' r='0.4' fill-opacity='0.03'/>
    <circle cx='70' cy='370' r='0.3' fill-opacity='0.03'/>
    <circle cx='270' cy='375' r='0.3' fill-opacity='0.03'/>
    <circle cx='140' cy='120' r='0.3' fill-opacity='0.02'/>
    <circle cx='200' cy='115' r='0.3' fill-opacity='0.02'/>
  </g>

</g>
</svg>
