<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg    { fill: #0d0d14; }
    .lines { stroke: rgba(255,255,255,0.72); }
    .ring  { stroke: rgba(255,255,255,0.50); }
    @media (prefers-color-scheme: light) {
      .bg    { fill: #f0f0ee; }
      .lines { stroke: rgba(0,0,0,0.62); }
      .ring  { stroke: rgba(0,0,0,0.45); }
    }
  </style>
  <defs>
    <clipPath id="fc">
      <circle cx="16" cy="16" r="13.4"/>
    </clipPath>
  </defs>
  <!-- Background pill -->
  <circle class="bg" cx="16" cy="16" r="16"/>
  <!-- Diagonal lines clipped to circle (y = -x + c, c spaced 4.24px = 3px perp.) -->
  <g clip-path="url(#fc)" class="lines" stroke-width="1.15" stroke-linecap="butt">
    <line x1="-5" y1="20"   x2="20"   y2="-5"/>
    <line x1="-5" y1="24.3" x2="24.3" y2="-5"/>
    <line x1="-5" y1="28.5" x2="28.5" y2="-5"/>
    <line x1="-5" y1="32.8" x2="32.8" y2="-5"/>
    <line x1="-5" y1="37"   x2="37"   y2="-5"/>
    <line x1="-5" y1="41.2" x2="41.2" y2="-5"/>
    <line x1="-5" y1="45.5" x2="45.5" y2="-5"/>
    <line x1="-5" y1="49.7" x2="49.7" y2="-5"/>
    <line x1="-5" y1="54"   x2="54"   y2="-5"/>
  </g>
  <!-- Outer ring -->
  <circle class="ring" cx="16" cy="16" r="13.4" fill="none" stroke-width="1.15"/>
</svg>
