<!doctype html>
<!-- ES modules require a local HTTP server (e.g. `npx serve .` or VS Code Live Server) -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>liminal</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body>

    <!-- ── Left control panel ─────────────────────────────────────────────── -->
    <aside class="panel">

      <div class="panel-section">
        <h2><i data-lucide="user"></i>Identity</h2>
        <div class="field">
          <span>Name</span>
          <input id="person-name" type="text" value="Alex Reeves" placeholder="Full name" />
        </div>
        <div class="field">
          <span>Job Title</span>
          <input id="job-title" type="text" value="Senior Engineer" placeholder="Job title" />
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="fingerprint"></i>Card</h2>
        <div class="field">
          <span>Seed</span>
          <input id="seed" type="number" value="42" min="0" max="999999" />
        </div>
        <div class="field field--row">
          <input id="show-lanyard" type="checkbox" />
          <span>Lanyard Hole</span>
        </div>
        <div class="field field--row">
          <input id="show-shadow" type="checkbox" checked />
          <span>Drop Shadow</span>
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="palette"></i>Colour</h2>
        <div class="field">
          <div class="field-hdr">
            <span>Hue <span id="hue-value-display"></span>&deg;</span>
            <button class="btn-reset" id="hue-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="hue" type="range" min="0" max="359" value="220" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Saturation <span id="saturation-value-display"></span></span>
            <button class="btn-reset" id="saturation-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="saturation" type="range" min="0" max="100" step="1" value="50" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Theme</span>
            <button class="btn-reset" id="dark-reset" title="Reset to seed default">↺</button>
          </div>
          <div class="seg-control" id="theme-seg">
            <button id="theme-light">Light</button>
            <button id="theme-dark">Dark</button>
          </div>
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Lightness <span id="lightness-value-display"></span></span>
            <button class="btn-reset" id="lightness-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="card-lightness" type="range" min="0" max="100" step="1" value="16" />
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="layers"></i>Background</h2>
        <div class="field">
          <span>Noise Zoom <span id="noise-zoom-display">4</span></span>
          <input id="noise-zoom" type="range" min="2" max="16" step="1" value="4" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Brightness <span id="noise-brightness-display"></span></span>
            <button class="btn-reset" id="noise-brightness-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="noise-brightness" type="range" min="0" max="30" step="1" value="6" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Contrast <span id="noise-contrast-display"></span></span>
            <button class="btn-reset" id="noise-contrast-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="noise-contrast" type="range" min="0" max="20" step="1" value="5" />
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="shapes"></i>Logo</h2>
        <div class="field">
          <span>Style <span id="logo-name-display"></span></span>
          <select id="logo-style">
            <option value="-1">Auto</option>
            <option value="0">Venn</option>
            <option value="1">Segmented Ring</option>
            <option value="2">Radial Spokes</option>
            <option value="3">Layered Arcs</option>
            <option value="4">Orbital</option>
            <option value="5">Parallel Lines</option>
            <option value="6">Polygon Nodes</option>
            <option value="7">Polygon Free Nodes</option>
            <option value="8">Dot Matrix</option>
            <option value="9">Dot Mask</option>
          </select>
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Logo Seed</span>
            <button class="btn-reset" id="logo-nonce-reset" title="Reset to seed default">↺</button>
          </div>
          <div class="inline-row">
            <input id="logo-nonce" type="number" value="0" min="0" max="999999" />
            <button id="btn-next-logo">Next</button>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="sparkles"></i>Effects</h2>
        <div class="field field--row">
          <input id="show-artifacts" type="checkbox" checked />
          <span>Artifacts</span>
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Seed</span>
            <button class="btn-reset" id="artifact-seed-reset" title="Reset to seed default">↺</button>
          </div>
          <div class="inline-row">
            <input id="artifact-seed" type="number" value="0" min="0" max="999999" />
            <button id="btn-next-artifact">Next</button>
          </div>
        </div>
        <div class="field">
          <span>Count <span id="art-count-display"></span></span>
          <input id="art-count" type="range" min="0" max="14" step="1" value="5" />
        </div>
        <div class="field">
          <span>Opacity <span id="art-opacity-display"></span></span>
          <input id="art-opacity" type="range" min="0" max="60" step="1" value="20" />
        </div>
        <div class="field">
          <span>Scale <span id="art-scale-display"></span></span>
          <input id="art-scale" type="range" min="25" max="200" step="5" value="100" />
        </div>
      </div>

    </aside>

    <!-- ── Canvas area ────────────────────────────────────────────────────── -->
    <main class="main">
      <div class="canvas-wrap">
        <div class="brand">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
            <defs>
              <clipPath id="lm-c">
                <circle cx="16" cy="16" r="13.4"/>
              </clipPath>
            </defs>
            <g clip-path="url(#lm-c)" stroke="rgba(255,255,255,0.70)" stroke-width="1.15" stroke-linecap="butt">
              <line x1="-5" y1="20"   x2="20"   y2="-5"/>
              <line x1="-5" y1="24.3" x2="24.3" y2="-5"/>
              <line x1="-5" y1="28.5" x2="28.5" y2="-5"/>
              <line x1="-5" y1="32.8" x2="32.8" y2="-5"/>
              <line x1="-5" y1="37"   x2="37"   y2="-5"/>
              <line x1="-5" y1="41.2" x2="41.2" y2="-5"/>
              <line x1="-5" y1="45.5" x2="45.5" y2="-5"/>
              <line x1="-5" y1="49.7" x2="49.7" y2="-5"/>
              <line x1="-5" y1="54"   x2="54"   y2="-5"/>
            </g>
            <circle cx="16" cy="16" r="13.4" fill="none" stroke="rgba(255,255,255,0.48)" stroke-width="1.15"/>
          </svg>
          <span class="brand-name">liminal</span>
        </div>
        <canvas id="canvas"></canvas>
        <p class="descriptor" id="card-descriptor"></p>
        <div class="card-actions">
          <button id="btn-render"><i data-lucide="refresh-cw"></i>Render</button>
          <button id="btn-rand"><i data-lucide="shuffle"></i>Shuffle</button>
          <button id="btn-export"><i data-lucide="download"></i>Export PNG</button>
        </div>
      </div>
    </main>

    <script type="module">
      import { generateCard, deriveColorParams } from "./modules/card.js";
      import { makePRNG }                        from "./modules/prng.js";

      // ── DOM references ────────────────────────────────────────────────────
      const seedInput              = document.getElementById("seed");

      const hueSlider              = document.getElementById("hue");
      const hueDisplay             = document.getElementById("hue-value-display");
      const hueReset               = document.getElementById("hue-reset");
      const saturationSlider       = document.getElementById("saturation");
      const saturationDisplay      = document.getElementById("saturation-value-display");
      const saturationReset        = document.getElementById("saturation-reset");
      const themeLightBtn          = document.getElementById("theme-light");
      const themeDarkBtn           = document.getElementById("theme-dark");
      const isDarkReset            = document.getElementById("dark-reset");
      const cardLightnessSlider    = document.getElementById("card-lightness");
      const cardLightnessDisplay   = document.getElementById("lightness-value-display");
      const cardLightnessReset     = document.getElementById("lightness-reset");

      const noiseZoomSlider        = document.getElementById("noise-zoom");
      const noiseZoomDisplay       = document.getElementById("noise-zoom-display");
      const noiseBrightnessSlider  = document.getElementById("noise-brightness");
      const noiseBrightnessDisplay = document.getElementById("noise-brightness-display");
      const noiseBrightnessReset   = document.getElementById("noise-brightness-reset");
      const noiseContrastSlider    = document.getElementById("noise-contrast");
      const noiseContrastDisplay   = document.getElementById("noise-contrast-display");
      const noiseContrastReset     = document.getElementById("noise-contrast-reset");

      const personNameInput        = document.getElementById("person-name");
      const jobTitleInput          = document.getElementById("job-title");

      const logoStyleSelect        = document.getElementById("logo-style");
      const logoNameDisplay        = document.getElementById("logo-name-display");
      const logoNonceInput         = document.getElementById("logo-nonce");
      const logoNonceReset         = document.getElementById("logo-nonce-reset");

      const showArtifactsToggle    = document.getElementById("show-artifacts");
      const artifactSeedInput      = document.getElementById("artifact-seed");
      const artifactSeedReset      = document.getElementById("artifact-seed-reset");
      const artCountSlider         = document.getElementById("art-count");
      const artCountDisplay        = document.getElementById("art-count-display");
      const artOpacitySlider       = document.getElementById("art-opacity");
      const artOpacityDisplay      = document.getElementById("art-opacity-display");
      const artScaleSlider         = document.getElementById("art-scale");
      const artScaleDisplay        = document.getElementById("art-scale-display");
      const showShadowToggle       = document.getElementById("show-shadow");
      const showLanyardToggle      = document.getElementById("show-lanyard");

      // ── Override state ────────────────────────────────────────────────────
      // Only keys that the user has explicitly set are present.
      // Absent key → use seed-derived default.
      const colorOverrides = {};  // isDark | cardLightness | hue | saturation | noiseBrightness | noiseContrast
      const seedOverrides  = {};  // logoNonce | artifactSeed

      const LOGO_NAMES = ['Venn', 'Segmented Ring', 'Radial Spokes', 'Layered Arcs',
                          'Orbital', 'Parallel Lines', 'Polygon Nodes', 'Polygon Free Nodes',
                          'Dot Matrix', 'Dot Mask'];

      // ── Seed-derived defaults ─────────────────────────────────────────────
      function deriveSeedParams(seed) {
        const p = makePRNG(seed ^ 0xDEADBEEF);
        return {
          logoNonce:    p.int(0, 99999),
          artifactSeed: p.int(0, 99999),
        };
      }

      // ── Effective values (override ?? seed-derived) ───────────────────────
      function getEffectiveColor() {
        const seed    = parseInt(seedInput.value, 10) | 0;
        const derived = deriveColorParams(seed);
        const effectiveIsDark = colorOverrides.isDark ?? derived.isDark;
        // When isDark is overridden to the opposite mode, use the alt derived lightness
        // so the slider shows a sensible value for the new mode.
        const derivedLightness = effectiveIsDark === derived.isDark
          ? derived.cardLightness
          : derived.altCardLightness;
        return {
          isDark:          effectiveIsDark,
          cardLightness:   colorOverrides.cardLightness   ?? derivedLightness,
          hue:             colorOverrides.hue             ?? derived.hue,
          saturation:      colorOverrides.saturation      ?? derived.saturation,
          noiseBrightness: colorOverrides.noiseBrightness ?? derived.noiseBrightness,
          noiseContrast:   colorOverrides.noiseContrast   ?? derived.noiseContrast,
        };
      }

      function getEffectiveSeeds() {
        const seed    = parseInt(seedInput.value, 10) | 0;
        const derived = deriveSeedParams(seed);
        return {
          logoNonce:    seedOverrides.logoNonce    ?? derived.logoNonce,
          artifactSeed: seedOverrides.artifactSeed ?? derived.artifactSeed,
        };
      }

      // ── Slider / display sync ─────────────────────────────────────────────
      function updateThemeSeg(isDark) {
        themeLightBtn.classList.toggle("active", !isDark);
        themeDarkBtn.classList.toggle("active",   isDark);
      }

      function updateColorSliders() {
        const c = getEffectiveColor();
        updateThemeSeg(c.isDark);
        cardLightnessSlider.value        = c.cardLightness;
        cardLightnessDisplay.textContent = c.cardLightness;
        hueSlider.value                  = c.hue;
        hueDisplay.textContent           = c.hue;
        saturationSlider.value           = c.saturation;
        saturationDisplay.textContent    = c.saturation;
        noiseBrightnessSlider.value      = Math.round(c.noiseBrightness * 100);
        noiseBrightnessDisplay.textContent = Math.round(c.noiseBrightness * 100);
        noiseContrastSlider.value        = Math.round(c.noiseContrast * 100);
        noiseContrastDisplay.textContent = Math.round(c.noiseContrast * 100);
      }

      function updateSeedInputs() {
        const s = getEffectiveSeeds();
        logoNonceInput.value    = s.logoNonce;
        artifactSeedInput.value = s.artifactSeed;
      }

      function updateResetButtons() {
        isDarkReset.classList.toggle('visible',            colorOverrides.isDark          !== undefined);
        cardLightnessReset.classList.toggle('visible',     colorOverrides.cardLightness   !== undefined);
        hueReset.classList.toggle('visible',               colorOverrides.hue             !== undefined);
        saturationReset.classList.toggle('visible',        colorOverrides.saturation      !== undefined);
        noiseBrightnessReset.classList.toggle('visible',   colorOverrides.noiseBrightness !== undefined);
        noiseContrastReset.classList.toggle('visible',     colorOverrides.noiseContrast   !== undefined);
        logoNonceReset.classList.toggle('visible',         seedOverrides.logoNonce        !== undefined);
        artifactSeedReset.classList.toggle('visible',      seedOverrides.artifactSeed     !== undefined);
      }

      function updateLogoName() {
        const override = parseInt(logoStyleSelect.value, 10);
        if (override >= 0) {
          logoNameDisplay.textContent = '';
        } else {
          const seed  = parseInt(seedInput.value, 10) | 0;
          const style = makePRNG(seed ^ 0x9E3779B9).int(0, 9);
          logoNameDisplay.textContent = `[${LOGO_NAMES[style]}]`;
        }
      }

      // ── Build params for generateCard ─────────────────────────────────────
      function params(transparent = false) {
        const color = getEffectiveColor();
        const seeds = getEffectiveSeeds();
        return {
          size:                  1024,
          padding:               0.08,
          seed:                  parseInt(seedInput.value, 10) | 0,
          logoNonce:             seeds.logoNonce,
          logoStyle:             parseInt(logoStyleSelect.value, 10),
          hue:                   color.hue,
          isDarkOverride:        colorOverrides.isDark          !== undefined ? colorOverrides.isDark          : null,
          cardLightnessOverride: colorOverrides.cardLightness   !== undefined ? colorOverrides.cardLightness   : null,
          saturationOverride:    colorOverrides.saturation      !== undefined ? colorOverrides.saturation      : null,
          noiseZoom:             parseInt(noiseZoomSlider.value, 10) | 0,
          noiseBrightness:       color.noiseBrightness,
          noiseContrast:         color.noiseContrast,
          personName:            personNameInput.value.trim(),
          jobTitle:              jobTitleInput.value.trim(),
          artifactSeed:          seeds.artifactSeed,
          artifactOpacity:       parseInt(artOpacitySlider.value, 10) / 100,
          artifactCount:         parseInt(artCountSlider.value, 10) === 0 ? null : parseInt(artCountSlider.value, 10),
          artifactScale:         parseInt(artScaleSlider.value, 10) / 100,
          showArtifacts:         showArtifactsToggle.checked,
          showShadow:            showShadowToggle.checked,
          showLanyard:           showLanyardToggle.checked,
          transparent,
        };
      }

      // ── URL sync ──────────────────────────────────────────────────────────
      // Named so it can be called again from popstate.
      // Clears all overrides first so stale values don't bleed through.
      function applyQueryString() {
        clearAllOverrides();
        const q = new URLSearchParams(location.search);

        if (q.has("seed"))      seedInput.value              = q.get("seed");
        if (q.has("lstyle"))    logoStyleSelect.value        = q.get("lstyle");
        if (q.has("zoom"))    { noiseZoomSlider.value        = q.get("zoom");
                                noiseZoomDisplay.textContent = noiseZoomSlider.value; }
        if (q.has("name"))      personNameInput.value        = q.get("name");
        if (q.has("title"))     jobTitleInput.value          = q.get("title");
        if (q.has("art_show"))    showArtifactsToggle.checked = q.get("art_show")  !== "0";
        if (q.has("art_count"))  { artCountSlider.value   = q.get("art_count");
                                    artCountDisplay.textContent = artCountLabel(artCountSlider.value); }
        if (q.has("art_opacity")){ artOpacitySlider.value  = q.get("art_opacity");
                                    artOpacityDisplay.textContent = artOpacitySlider.value; }
        if (q.has("art_scale"))  { artScaleSlider.value    = q.get("art_scale");
                                    artScaleDisplay.textContent = artScaleSlider.value + '%'; }
        if (q.has("shadow"))    showShadowToggle.checked     = q.get("shadow")    !== "0";
        if (q.has("lanyard"))   showLanyardToggle.checked    = q.get("lanyard")   !== "0";

        // Colour overrides — only in URL if user set them
        if (q.has("dark"))      colorOverrides.isDark          = q.get("dark")     !== "0";
        if (q.has("litness"))   colorOverrides.cardLightness   = parseInt(q.get("litness"),   10);
        if (q.has("hue"))       colorOverrides.hue             = parseInt(q.get("hue"),       10);
        if (q.has("sat"))       colorOverrides.saturation      = parseInt(q.get("sat"),       10);
        if (q.has("nbright"))   colorOverrides.noiseBrightness = parseInt(q.get("nbright"),   10) / 100;
        if (q.has("ncontrast")) colorOverrides.noiseContrast   = parseInt(q.get("ncontrast"), 10) / 100;

        // Seed overrides
        if (q.has("nonce"))     seedOverrides.logoNonce    = parseInt(q.get("nonce"),    10);
        if (q.has("art_seed")) seedOverrides.artifactSeed = parseInt(q.get("art_seed"), 10);
      }

      // push=true  → pushState    (navigable: shuffle, seed change, discrete actions)
      // push=false → replaceState (continuous: slider drag, text typing)
      function syncURL(push = false) {
        const q = new URLSearchParams({
          seed:      seedInput.value,
          lstyle:    logoStyleSelect.value,
          zoom:      noiseZoomSlider.value,
          name:      personNameInput.value.trim(),
          title:     jobTitleInput.value.trim(),
          art_show:    showArtifactsToggle.checked ? "1" : "0",
          art_count:   artCountSlider.value,
          art_opacity: artOpacitySlider.value,
          art_scale:   artScaleSlider.value,
          shadow:      showShadowToggle.checked   ? "1" : "0",
          lanyard:   showLanyardToggle.checked    ? "1" : "0",
        });
        if (colorOverrides.isDark          !== undefined) q.set("dark",     colorOverrides.isDark ? "1" : "0");
        if (colorOverrides.cardLightness   !== undefined) q.set("litness",  colorOverrides.cardLightness);
        if (colorOverrides.hue             !== undefined) q.set("hue",      colorOverrides.hue);
        if (colorOverrides.saturation      !== undefined) q.set("sat",      colorOverrides.saturation);
        if (colorOverrides.noiseBrightness !== undefined) q.set("nbright",  Math.round(colorOverrides.noiseBrightness * 100));
        if (colorOverrides.noiseContrast   !== undefined) q.set("ncontrast",Math.round(colorOverrides.noiseContrast   * 100));
        if (seedOverrides.logoNonce        !== undefined) q.set("nonce",    seedOverrides.logoNonce);
        if (seedOverrides.artifactSeed     !== undefined) q.set("art_seed", seedOverrides.artifactSeed);
        const url = "?" + q.toString();
        if (push) history.pushState(null, "", url);
        else      history.replaceState(null, "", url);
      }

      // ── Card descriptor ───────────────────────────────────────────────────
      function hueToColorName(hue) {
        const stops = [
          [15, 'Red'], [30, 'Orange'], [55, 'Amber'], [75, 'Yellow'],
          [150, 'Green'], [175, 'Teal'], [195, 'Cyan'], [225, 'Sky'],
          [255, 'Blue'], [285, 'Violet'], [315, 'Purple'], [345, 'Rose'],
        ];
        for (const [max, name] of stops) if (hue < max) return name;
        return 'Red';
      }

      function getCardDescriptor() {
        const color    = getEffectiveColor();
        const seed     = parseInt(seedInput.value, 10) | 0;
        const theme    = color.isDark ? 'Dark' : 'Light';
        const name     = personNameInput.value.trim();
        const parts    = [theme, name && name, `#${seed}`].filter(Boolean);
        return parts.join(' · ');
      }

      function updateDescriptor() {
        const desc = getCardDescriptor();
        document.getElementById('card-descriptor').textContent = desc;
        document.title = `liminal · ${desc}`;
      }

      function render(push = false) {
        generateCard(params());
        syncURL(push);
        updateLogoName();
        updateDescriptor();
      }

      // Restore full state when user navigates back/forward.
      window.addEventListener("popstate", () => {
        applyQueryString();
        updateColorSliders();
        updateSeedInputs();
        updateResetButtons();
        generateCard(params()); // render without touching history
        updateLogoName();
        updateDescriptor();
      });

      // ── Seed change: clear all overrides ─────────────────────────────────
      function clearAllOverrides() {
        delete colorOverrides.isDark;
        delete colorOverrides.cardLightness;
        delete colorOverrides.hue;
        delete colorOverrides.saturation;
        delete colorOverrides.noiseBrightness;
        delete colorOverrides.noiseContrast;
        delete seedOverrides.logoNonce;
        delete seedOverrides.artifactSeed;
      }

      seedInput.addEventListener("change", () => {
        clearAllOverrides();
        updateColorSliders();
        updateSeedInputs();
        updateResetButtons();
        render(true);
      });

      // ── Colour events ─────────────────────────────────────────────────────
      hueSlider.addEventListener("input", () => {
        colorOverrides.hue     = parseInt(hueSlider.value, 10);
        hueDisplay.textContent = hueSlider.value;
        updateResetButtons();
        render();
      });
      hueReset.addEventListener("click", () => {
        delete colorOverrides.hue;
        updateColorSliders();
        updateResetButtons();
        render(true);
      });

      saturationSlider.addEventListener("input", () => {
        colorOverrides.saturation       = parseInt(saturationSlider.value, 10);
        saturationDisplay.textContent   = saturationSlider.value;
        updateResetButtons();
        render();
      });
      saturationReset.addEventListener("click", () => {
        delete colorOverrides.saturation;
        updateColorSliders();
        updateResetButtons();
        render(true);
      });

      function setTheme(isDark) {
        colorOverrides.isDark = isDark;
        // Clear lightness override when switching mode — altCardLightness kicks in automatically.
        delete colorOverrides.cardLightness;
        updateColorSliders();
        updateResetButtons();
        render(true);
      }
      themeLightBtn.addEventListener("click", () => setTheme(false));
      themeDarkBtn.addEventListener("click",  () => setTheme(true));
      isDarkReset.addEventListener("click", () => {
        delete colorOverrides.isDark;
        delete colorOverrides.cardLightness; // coupled: lightness was mode-specific
        updateColorSliders();
        updateResetButtons();
        render(true);
      });

      cardLightnessSlider.addEventListener("input", () => {
        colorOverrides.cardLightness     = parseInt(cardLightnessSlider.value, 10);
        cardLightnessDisplay.textContent = cardLightnessSlider.value;
        updateResetButtons();
        render();
      });
      cardLightnessReset.addEventListener("click", () => {
        delete colorOverrides.cardLightness;
        updateColorSliders();
        updateResetButtons();
        render(true);
      });

      // ── Background events ─────────────────────────────────────────────────
      noiseZoomSlider.addEventListener("input", () => {
        noiseZoomDisplay.textContent = noiseZoomSlider.value;
        render();
      });

      noiseBrightnessSlider.addEventListener("input", () => {
        colorOverrides.noiseBrightness     = parseInt(noiseBrightnessSlider.value, 10) / 100;
        noiseBrightnessDisplay.textContent = noiseBrightnessSlider.value;
        updateResetButtons();
        render();
      });
      noiseBrightnessReset.addEventListener("click", () => {
        delete colorOverrides.noiseBrightness;
        updateColorSliders();
        updateResetButtons();
        render(true);
      });

      noiseContrastSlider.addEventListener("input", () => {
        colorOverrides.noiseContrast     = parseInt(noiseContrastSlider.value, 10) / 100;
        noiseContrastDisplay.textContent = noiseContrastSlider.value;
        updateResetButtons();
        render();
      });
      noiseContrastReset.addEventListener("click", () => {
        delete colorOverrides.noiseContrast;
        updateColorSliders();
        updateResetButtons();
        render(true);
      });

      // ── Logo seed ─────────────────────────────────────────────────────────
      document.getElementById("btn-next-logo").addEventListener("click", () => {
        seedOverrides.logoNonce = (parseInt(logoNonceInput.value, 10) | 0) + 1;
        logoNonceInput.value    = seedOverrides.logoNonce;
        updateResetButtons();
        render(true);
      });
      logoNonceInput.addEventListener("change", () => {
        seedOverrides.logoNonce = parseInt(logoNonceInput.value, 10) | 0;
        updateResetButtons();
        render(true);
      });
      logoNonceReset.addEventListener("click", () => {
        delete seedOverrides.logoNonce;
        updateSeedInputs();
        updateResetButtons();
        render(true);
      });

      // ── Artifact sliders ──────────────────────────────────────────────────
      function artCountLabel(v) { return parseInt(v) === 0 ? 'auto' : v; }

      artCountSlider.addEventListener("input", () => {
        artCountDisplay.textContent = artCountLabel(artCountSlider.value);
        render();
      });
      artOpacitySlider.addEventListener("input", () => {
        artOpacityDisplay.textContent = artOpacitySlider.value;
        render();
      });
      artScaleSlider.addEventListener("input", () => {
        artScaleDisplay.textContent = artScaleSlider.value + '%';
        render();
      });

      // ── Artifact seed ─────────────────────────────────────────────────────
      document.getElementById("btn-next-artifact").addEventListener("click", () => {
        seedOverrides.artifactSeed = (parseInt(artifactSeedInput.value, 10) | 0) + 1;
        artifactSeedInput.value    = seedOverrides.artifactSeed;
        updateResetButtons();
        render(true);
      });
      artifactSeedInput.addEventListener("change", () => {
        seedOverrides.artifactSeed = parseInt(artifactSeedInput.value, 10) | 0;
        updateResetButtons();
        render(true);
      });
      artifactSeedReset.addEventListener("click", () => {
        delete seedOverrides.artifactSeed;
        updateSeedInputs();
        updateResetButtons();
        render(true);
      });

      // ── Other controls ────────────────────────────────────────────────────
      document.getElementById("btn-render").addEventListener("click", () => render(true));

      document.getElementById("btn-rand").addEventListener("click", () => {
        seedInput.value = (Math.random() * 99999) | 0;
        // Overrides survive shuffle — pinned values stay pinned.
        updateColorSliders();
        updateSeedInputs();
        updateResetButtons();
        render(true);
      });

      document.getElementById("btn-export").addEventListener("click", () => {
        const c = getEffectiveColor();
        const s = getEffectiveSeeds();
        generateCard(params(true));
        const link    = document.createElement("a");
        link.download = `card-s${seedInput.value}-h${c.hue}-l${s.logoNonce}.png`;
        link.href     = document.getElementById("canvas").toDataURL("image/png");
        link.click();
        render();
      });

      logoStyleSelect.addEventListener("change",      () => render(true));
      showArtifactsToggle.addEventListener("change",  () => render(true));
      showShadowToggle.addEventListener("change",     () => render(true));
      showLanyardToggle.addEventListener("change",    () => render(true));
      personNameInput.addEventListener("input", render);   // replaceState — continuous typing
      jobTitleInput.addEventListener("input",   render);   // replaceState — continuous typing

      // ── Init ──────────────────────────────────────────────────────────────
      artCountDisplay.textContent   = artCountLabel(artCountSlider.value);
      artOpacityDisplay.textContent = artOpacitySlider.value;
      artScaleDisplay.textContent   = artScaleSlider.value + '%';
      lucide.createIcons();
      applyQueryString();
      updateColorSliders();
      updateSeedInputs();
      updateResetButtons();
      render(); // replaceState on first load — initial URL is already canonical
    </script>

  </body>
</html>
