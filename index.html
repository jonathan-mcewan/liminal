<!doctype html>
<!-- ES modules require a local HTTP server (e.g. `npx serve .` or VS Code Live Server) -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LIMINAL</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body>

    <!-- ── Left control panel ─────────────────────────────────────────────── -->
    <aside class="panel">

      <div class="panel-section">
        <h2><i data-lucide="user"></i>Identity</h2>
        <div class="field">
          <span>Name</span>
          <input id="person-name" type="text" value="Alex Reeves" placeholder="Full name" />
        </div>
        <div class="field">
          <span>Job Title</span>
          <input id="job-title" type="text" value="Senior Engineer" placeholder="Job title" />
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="fingerprint"></i>Card</h2>
        <div class="field">
          <span>Seed</span>
          <input id="seed" type="text" value="42" placeholder="number or text" />
        </div>
        <div class="field field--row">
          <input id="show-lanyard" type="checkbox" />
          <span>Lanyard Hole</span>
        </div>
        <div class="field field--row">
          <input id="show-shadow" type="checkbox" checked />
          <span>Drop Shadow</span>
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="palette"></i>Colour</h2>
        <div class="field">
          <div class="field-hdr">
            <span>Hue <span id="hue-value-display"></span>&deg;</span>
            <button class="btn-reset" id="hue-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="hue" type="range" min="0" max="359" value="220" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Saturation <span id="saturation-value-display"></span></span>
            <button class="btn-reset" id="saturation-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="saturation" type="range" min="0" max="100" step="1" value="50" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Theme</span>
            <button class="btn-reset" id="dark-reset" title="Reset to seed default">↺</button>
          </div>
          <div class="seg-control" id="theme-seg">
            <button id="theme-light">Light</button>
            <button id="theme-dark">Dark</button>
          </div>
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Lightness <span id="lightness-value-display"></span></span>
            <button class="btn-reset" id="lightness-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="card-lightness" type="range" min="0" max="100" step="1" value="16" />
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="layers"></i>Background</h2>
        <div class="field">
          <span>Noise Zoom <span id="noise-zoom-display">4</span></span>
          <input id="noise-zoom" type="range" min="2" max="16" step="1" value="4" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Brightness <span id="noise-brightness-display"></span></span>
            <button class="btn-reset" id="noise-brightness-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="noise-brightness" type="range" min="0" max="30" step="1" value="6" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Contrast <span id="noise-contrast-display"></span></span>
            <button class="btn-reset" id="noise-contrast-reset" title="Reset to seed default">↺</button>
          </div>
          <input id="noise-contrast" type="range" min="0" max="20" step="1" value="5" />
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="shapes"></i>Logo</h2>
        <div class="field">
          <span>Style <span id="logo-name-display"></span></span>
          <select id="logo-style">
            <option value="-1">Auto</option>
            <option value="0">Venn</option>
            <option value="1">Segmented Ring</option>
            <option value="2">Radial Spokes</option>
            <option value="3">Layered Arcs</option>
            <option value="4">Orbital</option>
            <option value="5">Parallel Lines</option>
            <option value="6">Polygon Nodes</option>
            <option value="7">Polygon Free Nodes</option>
            <option value="8">Dot Matrix</option>
            <option value="9">Dot Mask</option>
            <option value="10">Spiral</option>
            <option value="11">Wave Field</option>
            <option value="12">Starburst</option>
            <option value="13">Lissajous</option>
            <option value="14">Rose Curve</option>
            <option value="15">Variable Dot Mask</option>
            <option value="16">Inlaid Rings</option>
          </select>
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Scale <span id="logo-scale-display">100%</span></span>
            <button class="btn-reset" id="logo-scale-reset" title="Reset to default">↺</button>
          </div>
          <input id="logo-scale" type="range" min="25" max="200" step="5" value="100" />
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Logo Seed</span>
            <button class="btn-reset" id="logo-nonce-reset" title="Reset to seed default">↺</button>
          </div>
          <div class="inline-row">
            <input id="logo-nonce" type="number" value="0" min="0" max="999999" />
            <button id="btn-next-logo">Next</button>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h2><i data-lucide="sparkles"></i>Effects</h2>
        <div class="field field--row">
          <input id="show-artifacts" type="checkbox" checked />
          <span>Artifacts</span>
        </div>
        <div class="field">
          <div class="field-hdr">
            <span>Seed</span>
            <button class="btn-reset" id="artifact-seed-reset" title="Reset to seed default">↺</button>
          </div>
          <div class="inline-row">
            <input id="artifact-seed" type="number" value="0" min="0" max="999999" />
            <button id="btn-next-artifact">Next</button>
          </div>
        </div>
        <div class="field">
          <span>Count <span id="art-count-display"></span></span>
          <input id="art-count" type="range" min="0" max="14" step="1" value="5" />
        </div>
        <div class="field">
          <span>Opacity <span id="art-opacity-display"></span></span>
          <input id="art-opacity" type="range" min="0" max="60" step="1" value="20" />
        </div>
        <div class="field">
          <span>Scale <span id="art-scale-display"></span></span>
          <input id="art-scale" type="range" min="25" max="200" step="5" value="100" />
        </div>
      </div>

    </aside>

    <!-- ── Canvas area ────────────────────────────────────────────────────── -->
    <main class="main">
      <div class="canvas-wrap">
        <div class="brand">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
            <defs>
              <clipPath id="lm-c">
                <circle cx="16" cy="16" r="13.4"/>
              </clipPath>
            </defs>
            <g clip-path="url(#lm-c)" stroke="rgba(255,255,255,0.70)" stroke-width="1.15" stroke-linecap="butt">
              <line x1="-5" y1="20"   x2="20"   y2="-5"/>
              <line x1="-5" y1="24.3" x2="24.3" y2="-5"/>
              <line x1="-5" y1="28.5" x2="28.5" y2="-5"/>
              <line x1="-5" y1="32.8" x2="32.8" y2="-5"/>
              <line x1="-5" y1="37"   x2="37"   y2="-5"/>
              <line x1="-5" y1="41.2" x2="41.2" y2="-5"/>
              <line x1="-5" y1="45.5" x2="45.5" y2="-5"/>
              <line x1="-5" y1="49.7" x2="49.7" y2="-5"/>
              <line x1="-5" y1="54"   x2="54"   y2="-5"/>
            </g>
            <circle cx="16" cy="16" r="13.4" fill="none" stroke="rgba(255,255,255,0.48)" stroke-width="1.15"/>
          </svg>
          <span class="brand-name">LIMINAL</span>
        </div>
        <canvas id="canvas" style="display:none"></canvas>
        <div id="svg-output"></div>
        <p class="descriptor" id="card-descriptor"></p>
        <div class="card-actions">
          <button id="btn-render"><i data-lucide="refresh-cw"></i>Render</button>
          <button id="btn-reset-all" class="btn-action-reset" title="Reset all overrides (keep name, title, seed)"><i data-lucide="rotate-ccw"></i></button>
          <button id="btn-rand"><i data-lucide="shuffle"></i>Shuffle</button>
          <button id="btn-export"><i data-lucide="download"></i>Export SVG</button>
          <button id="btn-copy-link"><i data-lucide="link"></i>Copy Link</button>
        </div>
        <div class="render-mode-toggle">
          <button id="btn-size-id"     class="mode-btn active">ID Card</button>
          <button id="btn-size-square" class="mode-btn">Square</button>
          <button id="btn-size-moo"    class="mode-btn">MOO</button>
        </div>
        <div class="render-mode-toggle">
          <button id="btn-mode-canvas" class="mode-btn">Canvas</button>
          <button id="btn-mode-svg"    class="mode-btn active">SVG</button>
        </div>
      </div>
    </main>

    <script type="module">
      import { generateCard }  from "./modules/card.js";
      import { SvgContext }    from "./modules/svg-ctx.js";
      import { artCountLabel } from "./modules/constants.js";
      import { colorOverrides, seedOverrides, clearAllOverrides } from "./modules/state.js";
      import { getSeed, updateColorSliders, updateSeedInputs, updateResetButtons,
               updateLogoName, updateDescriptor, buildParams, getFrameDims } from "./modules/ui-sync.js";
      import { applyQueryString, syncURL } from "./modules/url-sync.js";
      import { getEffectiveColor, getEffectiveSeeds } from "./modules/state.js";

      // ── DOM cache ─────────────────────────────────────────────────────────
      const dom = {
        seedInput:              document.getElementById("seed"),
        hueSlider:              document.getElementById("hue"),
        hueDisplay:             document.getElementById("hue-value-display"),
        hueReset:               document.getElementById("hue-reset"),
        saturationSlider:       document.getElementById("saturation"),
        saturationDisplay:      document.getElementById("saturation-value-display"),
        saturationReset:        document.getElementById("saturation-reset"),
        themeLightBtn:          document.getElementById("theme-light"),
        themeDarkBtn:           document.getElementById("theme-dark"),
        isDarkReset:            document.getElementById("dark-reset"),
        cardLightnessSlider:    document.getElementById("card-lightness"),
        cardLightnessDisplay:   document.getElementById("lightness-value-display"),
        cardLightnessReset:     document.getElementById("lightness-reset"),
        noiseZoomSlider:        document.getElementById("noise-zoom"),
        noiseZoomDisplay:       document.getElementById("noise-zoom-display"),
        noiseBrightnessSlider:  document.getElementById("noise-brightness"),
        noiseBrightnessDisplay: document.getElementById("noise-brightness-display"),
        noiseBrightnessReset:   document.getElementById("noise-brightness-reset"),
        noiseContrastSlider:    document.getElementById("noise-contrast"),
        noiseContrastDisplay:   document.getElementById("noise-contrast-display"),
        noiseContrastReset:     document.getElementById("noise-contrast-reset"),
        personNameInput:        document.getElementById("person-name"),
        jobTitleInput:          document.getElementById("job-title"),
        logoStyleSelect:        document.getElementById("logo-style"),
        logoNameDisplay:        document.getElementById("logo-name-display"),
        logoScaleSlider:        document.getElementById("logo-scale"),
        logoScaleDisplay:       document.getElementById("logo-scale-display"),
        logoScaleReset:         document.getElementById("logo-scale-reset"),
        logoNonceInput:         document.getElementById("logo-nonce"),
        logoNonceReset:         document.getElementById("logo-nonce-reset"),
        btnSizeId:              document.getElementById("btn-size-id"),
        btnSizeSquare:          document.getElementById("btn-size-square"),
        btnSizeMoo:             document.getElementById("btn-size-moo"),
        showArtifactsToggle:    document.getElementById("show-artifacts"),
        artifactSeedInput:      document.getElementById("artifact-seed"),
        artifactSeedReset:      document.getElementById("artifact-seed-reset"),
        artCountSlider:         document.getElementById("art-count"),
        artCountDisplay:        document.getElementById("art-count-display"),
        artOpacitySlider:       document.getElementById("art-opacity"),
        artOpacityDisplay:      document.getElementById("art-opacity-display"),
        artScaleSlider:         document.getElementById("art-scale"),
        artScaleDisplay:        document.getElementById("art-scale-display"),
        showShadowToggle:       document.getElementById("show-shadow"),
        showLanyardToggle:      document.getElementById("show-lanyard"),
        cardDescriptor:         document.getElementById("card-descriptor"),
        canvasEl:               document.getElementById("canvas"),
        svgOutputEl:            document.getElementById("svg-output"),
        cardSize:               'id',
      };

      // ── Card size ────────────────────────────────────────────────────────

      function syncCardSizeButtons() {
        dom.btnSizeId.classList.toggle('active',     dom.cardSize === 'id');
        dom.btnSizeSquare.classList.toggle('active', dom.cardSize === 'square');
        dom.btnSizeMoo.classList.toggle('active',    dom.cardSize === 'moo');
      }

      function setCardSize(size) {
        dom.cardSize = size;
        syncCardSizeButtons();
        render(true);
      }

      // ── Render mode ───────────────────────────────────────────────────────
      let renderMode = 'svg';

      function setRenderMode(mode) {
        renderMode = mode;
        dom.canvasEl.style.display    = mode === 'canvas' ? '' : 'none';
        dom.svgOutputEl.style.display = mode === 'svg'    ? '' : 'none';
        document.getElementById('btn-mode-canvas').classList.toggle('active', mode === 'canvas');
        document.getElementById('btn-mode-svg').classList.toggle('active',    mode === 'svg');
        const exportBtn = document.getElementById('btn-export');
        exportBtn.innerHTML = `<i data-lucide="download"></i>Export ${mode === 'svg' ? 'SVG' : 'PNG'}`;
        lucide.createIcons();
        render();
      }

      function render(push = false) {
        const { frameW, frameH } = getFrameDims(dom);
        const aspect = `${frameW} / ${frameH}`;

        if (renderMode === 'svg') {
          const p   = buildParams(dom, true);
          const svg = new SvgContext(frameW, frameH);
          generateCard({ ...p, ctx: svg });
          dom.svgOutputEl.innerHTML = svg.toSVG();
        } else {
          generateCard(buildParams(dom));
        }

        dom.canvasEl.style.aspectRatio    = aspect;
        dom.svgOutputEl.style.aspectRatio = aspect;

        syncURL(dom, push);
        updateLogoName(dom);
        updateDescriptor(dom);
      }

      // ── Events ────────────────────────────────────────────────────────────

      window.addEventListener("popstate", () => {
        applyQueryString(dom);
        syncCardSizeButtons();
        updateColorSliders(dom);
        updateSeedInputs(dom);
        updateResetButtons(dom);
        render();
      });

      dom.seedInput.addEventListener("change", () => {
        clearAllOverrides();
        updateColorSliders(dom);
        updateSeedInputs(dom);
        updateResetButtons(dom);
        render(true);
      });

      // Colour
      dom.hueSlider.addEventListener("input", () => {
        colorOverrides.hue          = parseInt(dom.hueSlider.value, 10);
        dom.hueDisplay.textContent  = dom.hueSlider.value;
        updateResetButtons(dom);
        render();
      });
      dom.hueReset.addEventListener("click", () => {
        delete colorOverrides.hue;
        updateColorSliders(dom);
        updateResetButtons(dom);
        render(true);
      });

      dom.saturationSlider.addEventListener("input", () => {
        colorOverrides.saturation          = parseInt(dom.saturationSlider.value, 10);
        dom.saturationDisplay.textContent  = dom.saturationSlider.value;
        updateResetButtons(dom);
        render();
      });
      dom.saturationReset.addEventListener("click", () => {
        delete colorOverrides.saturation;
        updateColorSliders(dom);
        updateResetButtons(dom);
        render(true);
      });

      function setTheme(isDark) {
        colorOverrides.isDark = isDark;
        delete colorOverrides.cardLightness;
        updateColorSliders(dom);
        updateResetButtons(dom);
        render(true);
      }
      dom.themeLightBtn.addEventListener("click", () => setTheme(false));
      dom.themeDarkBtn.addEventListener("click",  () => setTheme(true));
      dom.isDarkReset.addEventListener("click", () => {
        delete colorOverrides.isDark;
        delete colorOverrides.cardLightness;
        updateColorSliders(dom);
        updateResetButtons(dom);
        render(true);
      });

      dom.cardLightnessSlider.addEventListener("input", () => {
        colorOverrides.cardLightness          = parseInt(dom.cardLightnessSlider.value, 10);
        dom.cardLightnessDisplay.textContent  = dom.cardLightnessSlider.value;
        updateResetButtons(dom);
        render();
      });
      dom.cardLightnessReset.addEventListener("click", () => {
        delete colorOverrides.cardLightness;
        updateColorSliders(dom);
        updateResetButtons(dom);
        render(true);
      });

      // Background
      dom.noiseZoomSlider.addEventListener("input", () => {
        dom.noiseZoomDisplay.textContent = dom.noiseZoomSlider.value;
        render();
      });

      dom.noiseBrightnessSlider.addEventListener("input", () => {
        colorOverrides.noiseBrightness          = parseInt(dom.noiseBrightnessSlider.value, 10) / 100;
        dom.noiseBrightnessDisplay.textContent  = dom.noiseBrightnessSlider.value;
        updateResetButtons(dom);
        render();
      });
      dom.noiseBrightnessReset.addEventListener("click", () => {
        delete colorOverrides.noiseBrightness;
        updateColorSliders(dom);
        updateResetButtons(dom);
        render(true);
      });

      dom.noiseContrastSlider.addEventListener("input", () => {
        colorOverrides.noiseContrast          = parseInt(dom.noiseContrastSlider.value, 10) / 100;
        dom.noiseContrastDisplay.textContent  = dom.noiseContrastSlider.value;
        updateResetButtons(dom);
        render();
      });
      dom.noiseContrastReset.addEventListener("click", () => {
        delete colorOverrides.noiseContrast;
        updateColorSliders(dom);
        updateResetButtons(dom);
        render(true);
      });

      // Logo scale
      dom.logoScaleSlider.addEventListener("input", () => {
        dom.logoScaleDisplay.textContent = dom.logoScaleSlider.value + '%';
        dom.logoScaleReset.classList.toggle('visible', parseInt(dom.logoScaleSlider.value, 10) !== 100);
        render();
      });
      dom.logoScaleReset.addEventListener("click", () => {
        dom.logoScaleSlider.value        = 100;
        dom.logoScaleDisplay.textContent = '100%';
        dom.logoScaleReset.classList.remove('visible');
        render(true);
      });

      // Logo seed
      document.getElementById("btn-next-logo").addEventListener("click", () => {
        seedOverrides.logoNonce  = (parseInt(dom.logoNonceInput.value, 10) | 0) + 1;
        dom.logoNonceInput.value = seedOverrides.logoNonce;
        updateResetButtons(dom);
        render(true);
      });
      dom.logoNonceInput.addEventListener("change", () => {
        seedOverrides.logoNonce = parseInt(dom.logoNonceInput.value, 10) | 0;
        updateResetButtons(dom);
        render(true);
      });
      dom.logoNonceReset.addEventListener("click", () => {
        delete seedOverrides.logoNonce;
        updateSeedInputs(dom);
        updateResetButtons(dom);
        render(true);
      });

      // Artifact sliders
      dom.artCountSlider.addEventListener("input", () => {
        dom.artCountDisplay.textContent = artCountLabel(dom.artCountSlider.value);
        render();
      });
      dom.artOpacitySlider.addEventListener("input", () => {
        dom.artOpacityDisplay.textContent = dom.artOpacitySlider.value;
        render();
      });
      dom.artScaleSlider.addEventListener("input", () => {
        dom.artScaleDisplay.textContent = dom.artScaleSlider.value + '%';
        render();
      });

      // Artifact seed
      document.getElementById("btn-next-artifact").addEventListener("click", () => {
        seedOverrides.artifactSeed  = (parseInt(dom.artifactSeedInput.value, 10) | 0) + 1;
        dom.artifactSeedInput.value = seedOverrides.artifactSeed;
        updateResetButtons(dom);
        render(true);
      });
      dom.artifactSeedInput.addEventListener("change", () => {
        seedOverrides.artifactSeed = parseInt(dom.artifactSeedInput.value, 10) | 0;
        updateResetButtons(dom);
        render(true);
      });
      dom.artifactSeedReset.addEventListener("click", () => {
        delete seedOverrides.artifactSeed;
        updateSeedInputs(dom);
        updateResetButtons(dom);
        render(true);
      });

      // Actions
      document.getElementById("btn-render").addEventListener("click", () => render(true));

      document.getElementById("btn-reset-all").addEventListener("click", () => {
        clearAllOverrides();
        setCardSize('id');
        dom.logoStyleSelect.value         = '-1';
        dom.logoScaleSlider.value         = 100;
        dom.logoScaleDisplay.textContent  = '100%';
        dom.noiseZoomSlider.value         = 4;
        dom.noiseZoomDisplay.textContent  = '4';
        dom.showArtifactsToggle.checked   = true;
        dom.showShadowToggle.checked      = true;
        dom.showLanyardToggle.checked     = false;
        dom.artCountSlider.value          = 5;
        dom.artCountDisplay.textContent   = artCountLabel(5);
        dom.artOpacitySlider.value        = 20;
        dom.artOpacityDisplay.textContent = '20';
        dom.artScaleSlider.value          = 100;
        dom.artScaleDisplay.textContent   = '100%';
        updateColorSliders(dom);
        updateSeedInputs(dom);
        updateResetButtons(dom);
        render(true);
      });

      document.getElementById("btn-rand").addEventListener("click", () => {
        dom.seedInput.value = (Math.random() * 99999) | 0;
        updateColorSliders(dom);
        updateSeedInputs(dom);
        updateResetButtons(dom);
        render(true);
      });

      document.getElementById("btn-export").addEventListener("click", () => {
        const seed = getSeed(dom);
        const c = getEffectiveColor(seed);
        const s = getEffectiveSeeds(seed);
        const link = document.createElement("a");
        if (renderMode === 'svg') {
          const p   = buildParams(dom, true);
          const { frameW, frameH } = getFrameDims(dom);
          const svg = new SvgContext(frameW, frameH);
          generateCard({ ...p, ctx: svg });
          const blob = new Blob([svg.toSVG()], { type: 'image/svg+xml' });
          const url  = URL.createObjectURL(blob);
          link.download = `card-s${dom.seedInput.value}-h${c.hue}-l${s.logoNonce}.svg`;
          link.href     = url;
          link.click();
          URL.revokeObjectURL(url);
        } else {
          generateCard(buildParams(dom, true));
          link.download = `card-s${dom.seedInput.value}-h${c.hue}-l${s.logoNonce}.png`;
          link.href     = dom.canvasEl.toDataURL("image/png");
          link.click();
          render();
        }
      });

      document.getElementById("btn-copy-link").addEventListener("click", (e) => {
        navigator.clipboard.writeText(window.location.href);
        const btn = e.currentTarget;
        btn.textContent = "Copied!";
        setTimeout(() => { btn.innerHTML = '<i data-lucide="link"></i>Copy Link'; lucide.createIcons(); }, 1500);
      });

      document.getElementById("btn-mode-canvas").addEventListener("click", () => setRenderMode('canvas'));
      document.getElementById("btn-mode-svg").addEventListener("click",    () => setRenderMode('svg'));

      dom.btnSizeId.addEventListener("click",     () => setCardSize('id'));
      dom.btnSizeSquare.addEventListener("click", () => setCardSize('square'));
      dom.btnSizeMoo.addEventListener("click",    () => setCardSize('moo'));
      dom.logoStyleSelect.addEventListener("change",      () => render(true));
      dom.showArtifactsToggle.addEventListener("change",  () => render(true));
      dom.showShadowToggle.addEventListener("change",     () => render(true));
      dom.showLanyardToggle.addEventListener("change",    () => render(true));
      dom.personNameInput.addEventListener("input", render);
      dom.jobTitleInput.addEventListener("input",   render);

      // ── Init ──────────────────────────────────────────────────────────────
      dom.artCountDisplay.textContent   = artCountLabel(dom.artCountSlider.value);
      dom.artOpacityDisplay.textContent = dom.artOpacitySlider.value;
      dom.artScaleDisplay.textContent   = dom.artScaleSlider.value + '%';
      lucide.createIcons();
      applyQueryString(dom);
      syncCardSizeButtons();
      updateColorSliders(dom);
